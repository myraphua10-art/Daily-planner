function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function enableNotifications(){
  const statusEl = document.getElementById('notifStatus');
  const titleEl = document.getElementById('notifTitle');
  if(PUSH_SERVER === 'PASTE_YOUR_WORKER_URL_HERE'){
    statusEl.textContent = 'Not set up yet — Cloudflare Worker URL is missing.';
    return;
  }
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    statusEl.textContent = 'Push notifications are not supported in this browser.';
    return;
  }
  const isIOSNow = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if(isIOSNow && window.navigator.standalone !== true){
    statusEl.textContent = 'On iPhone/iPad: first "Add to Home Screen" above, then open the app from that icon, then tap here again.';
    return;
  }
  try{
    const reg = await navigator.serviceWorker.register('sw.js');
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){
      statusEl.textContent = 'Notifications permission was not granted.';
      return;
    }
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    await fetch(PUSH_SERVER + '/subscribe', {
      method: 'POST',

    });

    statusEl.textContent = 'Something went wrong enabling notifications: ' + err.message;

}

// ---- Parity engine ----
// Term weeks alternate Odd/Even from each term's first Monday — but the cycle resets
// at the start of a new term, so a single continuous anchor breaks across term breaks.
// Confirmed from the journal: T3W1 starts 29 Jun (odd), and T4W1 starts 14 Sep (odd, after
// the Sep school holidays — Sep 16 Wed is logged as OWN DAY, which only fits if that week is odd).
const TERM_ANCHORS = [
  {monday:'2026-06-29', parity:'odd'},
  {monday:'2026-09-14', parity:'odd'},
];
const MIN_DATE = '2026-06-29', MAX_DATE = '2026-11-29';
function mondayOf(d){
  const dt = new Date(d); const day = dt.getDay();
  const diff = (day===0?-6:1-day);
  dt.setDate(dt.getDate()+diff); dt.setHours(0,0,0,0); return dt;
}
function parityOf(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const mon = mondayOf(d);
  let anchor = TERM_ANCHORS[0];
  for(const a of TERM_ANCHORS){ if(mondayOf(new Date(a.monday+'T00:00:00')) <= mon) anchor = a; }
  const anchorMon = mondayOf(new Date(anchor.monday+'T00:00:00'));
  const weeks = Math.round((mon - anchorMon)/(7*86400000));
  const mod = ((weeks % 2)+2)%2;
  const flipped = mod!==0;
  if(!flipped) return anchor.parity;
  return anchor.parity==='odd' ? 'even' : 'odd';
}
function fmtDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
function fmtDateShort(dateStr){
  const d = new Date(dateStr+'T00:00:00');

}
function daysUntil(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr+'T00:00:00');
  return Math.round((target-today)/86400000);
}
function addDays(dateStr, n){

}

function freedSlotsFor(weekday, parity){
  const slots = [];
  if(weekday==='mon'){ slots.push({subject:'PE', start:'09:55', end:'10:55'}); }
  if(weekday==='tue' && parity==='odd'){ slots.push({subject:'Biology', start:'10:35', end:'11:35'}); }
  if(weekday==='wed'){
    if(parity==='odd'){ slots.push({subject:'OWN DAY', ownday:true}); }
    else { slots.push({subject:'Biology', start:'11:35', end:'12:35'}); }
  }
  if(weekday==='thu' && parity==='even'){ slots.push({subject:'PE', start:'07:55', end:'08:55'}); }
  if(weekday==='fri'){
    if(parity==='odd') slots.push({subject:'Biology P', start:'07:55', end:'08:55'});
    else slots.push({subject:'Biology P', start:'08:55', end:'09:55'});
  }
  return slots;
}
function studyBlocksFor(weekday, parity){
  if(weekday==='mon') return [{start:'13:35', end:'14:35'}];
  if(weekday==='tue'){
    const blocks = [{start:'13:35', end:'14:35'}];
    if(parity==='odd') blocks.unshift({start:'08:55', end:'09:55'});
    return blocks;
  }
  if(weekday==='thu') return [{start:'12:55', end:'13:35'}];
  if(weekday==='fri' && parity==='even') return [{start:'12:55', end:'13:35'}];
  return [];
}
const WEEKDAY_LABEL = {mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday'};

function nextExam(){
  const upcoming = EXAMS.filter(e=>daysUntil(e.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  return upcoming[0] || EXAMS[EXAMS.length-1];
}

function renderCountdown(){
  const e = nextExam();
  const d = daysUntil(e.date);
  document.getElementById('countdownBar').innerHTML = `
    <div>
      <div class="lbl">Next up</div>
      <div class="big">${e.subject} — ${e.code}</div>
    </div>
    <div style="text-align:right">
      <div class="big">${d===0?'TODAY':d+' day'+(d===1?'':'s')}</div>
      <div class="lbl">${fmtDate(e.date)} · ${e.weight!=null?e.weight+'% weighting':e.weightLabel}</div>
    </div>`;
}

function renderExams(){
  const sorted = [...EXAMS].sort((a,b)=> new Date(a.date)-new Date(b.date));
  const el = document.getElementById('tab-exams');
  el.innerHTML = '<h2 class="section-title">🎯 Master Exam Calendar</h2>' + sorted.map(e=>{
    const d = daysUntil(e.date);
    const dColor = d<0 ? '#9ca3af' : d<=7 ? '#fee2e2' : d<=21 ? '#fef3c7' : '#e0f2fe';
    const dText = d<0 ? '#6b7280' : d<=7 ? '#991b1b' : d<=21 ? '#92400e' : '#0369a1';
    return `<div class="card exam-card">
      <div class="exam-dot" style="background:${SUBJECT_COLORS[e.subject]}"></div>
      <div style="flex:1; min-width:0">
        <h3>${e.subject} <span style="color:${SUBJECT_COLORS[e.subject]}">· ${e.code}</span></h3>
        <span class="badge ${e.estimated?'estimated':'confirmed'}">${e.estimated?'estimated date':'confirmed date'}</span>
        <div class="exam-meta" style="margin-top:6px">${fmtDate(e.date)} &nbsp;·&nbsp; ${e.weight!=null?`<span class="weight">${e.weight}%</span> of subject grade`:e.weightLabel}</div>
        <div>${e.topics.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
      </div>
      <div class="exam-days" style="background:${dColor}; color:${dText}">${d<0?'past':d+'d'}</div>
    </div>`;
  }).join('') + `<div class="note">Dates marked "estimated" are derived from term-week (e.g. T3W6) rather than an exact calendar date confirmed by a teacher — worth a quick check against the school portal closer to the time.</div>`;
}

function renderWeekMap(){
  const el = document.getElementById('tab-week');
  el.innerHTML = `<h2 class="section-title">🗓️ Weekly Free-Time Map</h2>
    <p style="color:var(--sub); font-size:13px; margin-top:-8px">PE and Biology lessons are replaced with free study time. Existing Study Blocks (purple) are already in the normal timetable.</p>
    <div id="weekMapGrids"></div>`;
  const grids = document.getElementById('weekMapGrids');
  ['odd','even'].forEach(parity=>{
    const days = ['mon','tue','wed','thu','fri'];
    const cols = days.map(wd=>{
      const freed = freedSlotsFor(wd, parity);
      const blocks = studyBlocksFor(wd, parity);
      let html = `<div class="day-col"><h4>${WEEKDAY_LABEL[wd]}</h4>`;
      freed.forEach(f=>{
        if(f.ownday){ html += `<div class="slot own">🏠 OWN DAY<br><span style="font-weight:400">Full day at home</span></div>`; }
        else { html += `<div class="slot free">✅ ${f.subject} free<br>${f.start}–${f.end}</div>`; }
      });
      blocks.forEach(b=>{ html += `<div class="slot studyblock">📖 Study Block<br>${b.start}–${b.end}</div>`; });
      if(!freed.length && !blocks.length) html += `<div style="font-size:11.5px; color:#bbb; text-align:center; padding-top:10px">normal day</div>`;
      html += `</div>`;
      return html;
    }).join('');
    grids.innerHTML += `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0">${parity==='odd'?'🟡 Odd Week':'🔵 Even Week'}</h3>
      </div>
      <div class="week-grid">${cols}</div>
    </div>`;
  });
}

const TUITION_COLOR = '#ec4899';

function buildDayTimeline(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const wdIdx = d.getDay();
  const wdMap = {1:'mon',2:'tue',3:'wed',4:'thu',5:'fri'};
  const weekday = wdMap[wdIdx];
  const parity = parityOf(dateStr);
  const examToday = EXAMS.find(e=>e.date===dateStr);
  const override = DATE_OVERRIDES[dateStr];

  if(wdIdx===6){ // Saturday — open study day
    return {parity, weekend:true, items:[
      {time:'08:00–08:30', title:'Wake up & breakfast', desc:'Sleep in a little — recovery matters.', color:'#94a3b8'},
      {time:'09:00–12:00', title:'Timed past-paper practice', desc:'Pick the subject closest to its exam date.', color:SUBJECT_COLORS.Mathematics},
      {time:'12:00–13:00', title:'Lunch & break', desc:'', color:'#94a3b8'},
      {time:'13:30–16:00', title:'Review mistakes / weak-topic drilling', desc:'Go through the paper above — understand every wrong answer.', color:SUBJECT_COLORS.History},
      {time:'16:00–17:00', title:'Free / rest / family time', desc:'Protect this — burnout undoes progress.', color:'#94a3b8'},
      {time:'17:00–18:00', title:'🏋️ Gym', desc:'', color:'#0891b2'},
      {time:'20:00–22:00', title:'Light revision', desc:'Flashcards or formula recap, low intensity.', color:SUBJECT_COLORS.Physics},
      {time:'22:30', title:'Lights out', desc:'5am wake for swim training tomorrow if there’s school.', color:'#475569'},
    ]};
  }

  if(wdIdx===0){ // Sunday — tuition-heavy
    return {parity, weekend:true, items:[
      {time:'08:00–08:45', title:'Wake up & breakfast', desc:'', color:'#94a3b8'},
      {time:'09:00–11:00', title:'🧪 Chemistry Tuition', desc:'', color:TUITION_COLOR},
      {time:'11:15–13:15', title:'📐 Math Tuition', desc:'Only a 15-min gap after Chemistry — have a snack ready to bring.', color:TUITION_COLOR},
      {time:'13:15–14:15', title:'Lunch & break', desc:'', color:'#94a3b8'},
      {time:'14:15–16:00', title:'Open study block', desc:'Review tuition material or drill the nearest-exam subject.', color:SUBJECT_COLORS.History},
      {time:'16:15–18:15', title:'🀄 Chinese Tuition', desc:'', color:TUITION_COLOR},
      {time:'18:15–19:00', title:'Dinner', desc:'', color:'#94a3b8'},
      {time:'19:00–20:00', title:'🏋️ Gym', desc:'', color:'#0891b2'},
      {time:'20:00–22:00', title:'Light revision', desc:'Flashcards or formula recap, low intensity.', color:SUBJECT_COLORS.Physics},
      {time:'22:30', title:'Lights out', desc:'5am wake for swim training tomorrow.', color:'#475569'},
    ]};
  }

  const scheduleWeekday = override ? override.scheduleAsWeekday : weekday;
  const scheduleParity = override ? override.scheduleAsParity : parity;
  const freed = freedSlotsFor(scheduleWeekday, scheduleParity);
  const blocks = studyBlocksFor(scheduleWeekday, scheduleParity);
  const ownDay = freed.some(f=>f.ownday);
  const tuition = TUITION_WEEKDAY[weekday] || [];
  const items = [];
  items.push({time:'05:00', title:'Wake up', desc:'', color:'#94a3b8'});

  if(ownDay){
    items.push({time:'05:00–07:00', title:'Free morning (no swim training listed for OWN DAY — confirm with coach)', desc:'', color:'#94a3b8'});
    items.push({time:'07:30–09:30', title:'Deep-focus study block 1', desc:'Tackle your hardest / nearest-exam topic first while fresh.', color:SUBJECT_COLORS.Mathematics});
    items.push({time:'09:30–09:45', title:'Break', desc:'', color:'#94a3b8'});
    items.push({time:'09:45–11:45', title:'Timed past-paper practice', desc:'', color:SUBJECT_COLORS.History});
    items.push({time:'11:45–12:45', title:'Lunch', desc:'', color:'#94a3b8'});
    items.push({time:'13:00–15:00', title:'Review + weak-topic drilling', desc:'Go over the past paper above.', color:SUBJECT_COLORS.Physics});
    items.push({time:'15:00–16:00', title:'🏋️ Gym', desc:'', color:'#0891b2'});
    items.push({time:'16:00–18:00', title:'Deep-focus study block 2', desc:'Second subject, or continue weakest topic.', color:SUBJECT_COLORS.Chemistry});
    items.push({time:'18:00–19:00', title:'Dinner', desc:'', color:'#94a3b8'});
    items.push({time:'19:30–22:00', title:'Evening study block', desc:'Review what was covered today + tackle problem sets.', color:SUBJECT_COLORS.Mathematics});
    items.push({time:'22:00–22:30', title:'Wind down', desc:'Screens off, light review only.', color:'#475569'});
    items.push({time:'22:30', title:'😴 Lights out', desc:'Non-negotiable given the 5am wake.', color:'#1e293b'});
  } else {
    if(weekday==='wed'){
      items.push({time:'05:00–07:00', title:'Free morning', desc:'No swim training on Wednesdays.', color:'#94a3b8'});
    } else {
      items.push({time:'05:30–07:00', title:'🏊 Swim training', desc:'', color:'#0891b2'});
    }
    items.push({time:'07:00–08:00', title:'Travel & breakfast', desc:'', color:'#94a3b8'});
    items.push({time:'08:00–~15:15', title:'School (regular lessons)', desc:override?override.note:'Freed and study-block periods below are highlighted.', color:'#cbd5e1'});
    const periods = [
      ...freed.map(f=>({start:f.start, end:f.end, free:true, subject:f.subject})),
      ...blocks.map(b=>({start:b.start, end:b.end, free:false})),
    ].sort((a,b)=> a.start.localeCompare(b.start));
    periods.forEach(p=>{
      if(p.free) items.push({time:`${p.start}–${p.end}`, title:`✅ ${p.subject} lesson freed`, desc:'Use this period for focused study — see suggestion below.', color:SUBJECT_COLORS.Mathematics, free:true});
      else items.push({time:`${p.start}–${p.end}`, title:'📖 Existing Study Block', desc:'Already built into the timetable.', color:SUBJECT_COLORS.Physics});
    });
    items.push({time:'15:15–16:00', title:'Travel / snack / rest', desc:'', color:'#94a3b8'});

    if(weekday==='wed'){
      items.push({time:'16:00–16:30', title:'Afternoon study block', desc:'Short session before tuition.', color:SUBJECT_COLORS.History});
      items.push({time:'16:30–18:00', title:'📐 Math Tuition', desc:'End time estimated — adjust if it differs.', color:TUITION_COLOR});
      items.push({time:'18:00–19:00', title:'Dinner', desc:'', color:'#94a3b8'});
      items.push({time:'19:00–20:00', title:'🏋️ Gym', desc:'', color:'#0891b2'});
      items.push({time:'20:00–22:00', title:'Evening study block', desc:'Review what was covered today + tackle problem sets.', color:SUBJECT_COLORS.Chemistry});
      items.push({time:'22:00–22:30', title:'Wind down', desc:'Screens off, light review only.', color:'#475569'});
      items.push({time:'22:30', title:'😴 Lights out', desc:'Non-negotiable given the 5am wake.', color:'#1e293b'});
    } else if(weekday==='fri'){
      items.push({time:'16:00–18:00', title:'Afternoon study block', desc:'Nearest-exam subject priority.', color:SUBJECT_COLORS.History});
      items.push({time:'18:00–19:00', title:'🏋️ Gym', desc:'', color:'#0891b2'});
      items.push({time:'19:00–21:00', title:'⚛️ Physics Tuition', desc:'Bring a snack — straight from the gym.', color:TUITION_COLOR});
      items.push({time:'21:00–21:45', title:'Dinner', desc:'Later than usual on Fridays.', color:'#94a3b8'});
      items.push({time:'21:45–22:00', title:'Wind down', desc:'Screens off, light review only.', color:'#475569'});
      items.push({time:'22:00', title:'😴 Lights out', desc:'A little earlier than other nights since Physics Tuition runs late — catch up on sleep over the weekend.', color:'#1e293b'});
    } else {
      items.push({time:'16:00–18:00', title:'Afternoon study block', desc:'Nearest-exam subject priority.', color:SUBJECT_COLORS.History});
      items.push({time:'18:00–19:00', title:'🏋️ Gym', desc:'', color:'#0891b2'});
      items.push({time:'19:00–19:30', title:'Dinner', desc:'', color:'#94a3b8'});
      items.push({time:'19:30–22:00', title:'Evening study block', desc:'Review what was covered today + tackle problem sets.', color:SUBJECT_COLORS.Chemistry});
      items.push({time:'22:00–22:30', title:'Wind down', desc:'Screens off, light review only.', color:'#475569'});
      items.push({time:'22:30', title:'😴 Lights out', desc:'Non-negotiable given the 5am wake.', color:'#1e293b'});
    }
  }

  return {parity, weekday, ownDay, examToday, items, freed, override};
}

let currentDate = null;

function renderToday(dateStr){
  currentDate = dateStr;
  const data = buildDayTimeline(dateStr);
  const el = document.getElementById('tab-today');
  const atMin = dateStr <= MIN_DATE, atMax = dateStr >= MAX_DATE;
  let header = `<div class="date-picker-row">
    <div class="date-nav">
      <button id="prevDay" ${atMin?'disabled style="opacity:.3"':''}>‹</button>
      <input type="date" id="datePicker" value="${dateStr}" min="${MIN_DATE}" max="${MAX_DATE}">
      <button id="nextDay" ${atMax?'disabled style="opacity:.3"':''}>›</button>
    </div>
    <span class="parity-pill ${data.parity}">${data.parity.toUpperCase()} WEEK</span>
  </div>`;
  if(data.examToday){
    header += `<div class="card" style="background:#fef2f2; border:1px solid #fecaca;">
      <strong>🎯 EXAM TODAY:</strong> ${data.examToday.subject} ${data.examToday.code} (${data.examToday.weight!=null?data.examToday.weight+'%':data.examToday.weightLabel}). Light recap only — no new content.
    </div>`;
  }
  if(data.ownDay){
    header += `<div class="card" style="background:#fef2f2; border:1px solid #fecaca;"><strong>🏠 OWN DAY</strong> — full day at home. Great day for a timed past paper + deep review.</div>`;
  }
  if(data.override){
    header += `<div class="card" style="background:#fff7ed; border:1px solid #fed7aa;"><strong>⚠️ Schedule swap:</strong> ${data.override.note}</div>`;
  }
  if(EVENTS[dateStr]){
    header += `<div class="card" style="background:#fdf4ff; border:1px solid #f0abfc;">${EVENTS[dateStr].map(e=>`<div>${e}</div>`).join('')}</div>`;
  }
  const wdIdxToday = new Date(dateStr+'T00:00:00').getDay();
  const isPersonalDay = PERSONAL_DATES.includes(dateStr) || wdIdxToday===5 || wdIdxToday===0 || (wdIdxToday===1 && data.parity==='odd');
  if(isPersonalDay){
    header += `<div class="card" style="background:#f8fafc; border:1px solid #e2e8f0;"><strong>📌 Personal plans today</strong></div>`;
  }
  const timeline = `<div class="timeline">${data.items.map(it=>`
    <div class="tline-item">
      <div class="tline-time">${it.time}</div>
      <div class="tline-bar" style="background:${it.color}"></div>
      <div class="tline-content" style="background:${it.color}18;">
        <h5>${it.title}</h5>${it.desc?`<p>${it.desc}</p>`:''}
      </div>
    </div>`).join('')}</div>`;
  el.innerHTML = `<h2 class="section-title">📅 ${fmtDateShort(dateStr)}</h2>` + header + timeline;
  document.getElementById('datePicker').addEventListener('change', e=>{ renderToday(e.target.value); });
  document.getElementById('prevDay').addEventListener('click', ()=>{ if(!atMin) renderToday(addDays(dateStr,-1)); });
  document.getElementById('nextDay').addEventListener('click', ()=>{ if(!atMax) renderToday(addDays(dateStr,1)); });
}

function renderTopics(){
  const el = document.getElementById('tab-topics');
  el.innerHTML = '<h2 class="section-title">✅ Topic Tracker</h2>' + Object.entries(TOPIC_BANK).map(([subject,topics])=>{
    const rows = topics.map((t,i)=>{
      const key = `topic-${subject}-${i}`;
      return `<label class="topic-row" id="row-${key}">
        <input type="checkbox" data-key="${key}">
        <span>${t}</span>
      </label>`;
    }).join('');
    return `<div class="card topic-subject">
      <h3><span class="subject-dot" style="background:${SUBJECT_COLORS[subject]}"></span>${subject}</h3>
      <div class="progress-bg"><div class="progress-fill" id="bar-${subject}" style="width:0%; background:${SUBJECT_COLORS[subject]}"></div></div>
      ${rows}
    </div>`;
  }).join('');

  Object.keys(TOPIC_BANK).forEach(subject=>{
    const inputs = el.querySelectorAll(`input[data-key^="topic-${subject}-"]`);
    inputs.forEach(inp=>{
      const saved = localStorage.getItem(inp.dataset.key) === '1';
      inp.checked = saved;
      if(saved) document.getElementById(`row-${inp.dataset.key}`).classList.add('done');
      inp.addEventListener('change', ()=>{
        localStorage.setItem(inp.dataset.key, inp.checked ? '1':'0');
        document.getElementById(`row-${inp.dataset.key}`).classList.toggle('done', inp.checked);
        updateProgress(subject);
      });
    });
    updateProgress(subject);
  });
  function updateProgress(subject){
    const inputs = document.querySelectorAll(`input[data-key^="topic-${subject}-"]`);
    const total = inputs.length;
    const done = [...inputs].filter(i=>i.checked).length;
    document.getElementById(`bar-${subject}`).style.width = (total? (done/total*100):0) + '%';
  }
}

// ---- Nav (both sidebar + tabbar share the same data-tab buttons) ----
function switchTab(tabName){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabName));
  document.querySelectorAll('main section').forEach(s=>s.style.display='none');
  document.getElementById('tab-'+tabName).style.display='block';
  window.scrollTo({top:0, behavior:'instant'});
}
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});

// ---- PWA manifest (built inline as a blob so this stays a single file) ----
const manifest = {
  name: "Myra's Exam Planner",
  short_name: "Planner",
  start_url: ".",
  display: "standalone",
  background_color: "#f5f6fb",
  theme_color: "#6366f1",
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236366f1'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='-apple-system'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E",
    sizes: "100x100", type: "image/svg+xml"
  }]
};
document.getElementById('manifestLink').href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));

// Show the iOS "Add to Home Screen" hint only when running in mobile Safari (not already installed)
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if(isIOS && !isStandalone){
  document.getElementById('installBanner').style.display = 'flex';
}
document.getElementById('notifBanner').style.display = 'flex';
document.getElementById('notifBanner').addEventListener('click', enableNotifications);
if('serviceWorker' in navigator && 'PushManager' in window){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg) return reg.pushManager.getSubscription().then(sub=>{
      if(sub){
        document.getElementById('notifTitle').textContent = '🔔 Notifications enabled';
        document.getElementById('notifStatus').textContent = "You'll get reminders for swim, gym, tuition and study blocks.";
      }
    });
  });
}

// ---- Init ----
renderCountdown();
renderExams();
renderWeekMap();
renderTopics();
const todayStr = new Date().toISOString().slice(0,10);
const initDate = (todayStr >= MIN_DATE && todayStr <= MAX_DATE) ? todayStr : MIN_DATE;
renderToday(initDate);
</script>
